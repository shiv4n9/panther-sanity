server {
    listen 80;
    server_name _;

    # ── Landing page at root ─────────────────────────────────
    root /usr/share/nginx/html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for data files (XLSX, CSV) so updates are picked up immediately
    location ~* \.(xlsx|csv)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Proxy all /api calls to the Flask backend
    location /api/ {
        proxy_pass http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # Proxy health endpoint to backend
    location /health {
        proxy_pass http://backend:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ── Panther Sanity SPA at /sanity/ ────────────────────────
    location /sanity/ {
        alias /usr/share/nginx/html/sanity/;
        try_files $uri $uri/ /sanity/index.html;
    }

    # ── Landing page — exact root and fallback ────────────────
    location = / {
        try_files /landing/index.html =404;
    }

    location / {
        try_files $uri $uri/ /landing/index.html;
    }
}
