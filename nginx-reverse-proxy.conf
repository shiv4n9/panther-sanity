# Nginx Reverse Proxy Configuration for Panther Sanity Dashboard
# This allows you to access the dashboard via a domain name without port numbers

# HTTP Server - Redirects to HTTPS (optional, for production)
server {
    listen 80;
    server_name panther-sanity.juniper.net;  # Change to your domain
    
    # Redirect all HTTP to HTTPS (uncomment if you have SSL)
    # return 301 https://$server_name$request_uri;
    
    # Or serve directly over HTTP (for internal networks)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Backend API proxy
    location /api/ {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

